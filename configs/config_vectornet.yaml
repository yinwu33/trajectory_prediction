defaults:
  - _self_
  - datamodule: av2_vectornet
  - model: vectornet
  - trainer: default
  - logger: wandb
  - optimizer: adamw
  - experiment: null

project_name: vectornet
exp_name: test
seed: 42
resume_from: null
output_root_dir: ./outputs/${project_name}/${exp_name}/${now:%Y-%m-%d_%H-%M-%S}
ckpt_dir: ${output_root_dir}/ckpt

hydra:
  run:
    dir: ${output_root_dir}
